<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="topbar">
      <strong id="welcomeopen">OrbitOS</strong>
      <span id="time"></span>
    </div>

    <div id="desktopApps">
      <div class="appicon" id="missionIcon">
        <img class="appimage" src="./mission-log.jpg">
        <p>Mission Log</p>
      </div>

      <div class="appicon" id="launchIcon">
        <div class="basicIcon">🚀</div>
        <p>Launch Control</p>
      </div>
    </div>

    <div class="window" id="welcome">
      <div class="windowheader" id="welcomeheader">
        <strong>Welcome to OrbitOS</strong>
        <span class="closebutton" id="welcomeclose">X</span>
      </div>

      <h2>Introduction</h2>

      <p>SUPER IMPORTANT MISSION CONTROL CENTER! Pressing buttons might launch Artemis V, be careful!</p>

      <img class="windowimage" src="./download (1).jpeg">

      <a href="https://github.com/Mateooo93/OrbitOS">
        <p><strong>Source code</strong></p>
      </a>
    </div>

    <div class="window" id="mission" style="display: none; top: 150px; left: 180px;">
      <div class="windowheader" id="missionheader">
        <strong>Mission Log</strong>
        <span class="closebutton" id="missionclose">X</span>
      </div>

      <div class="appcontent">
        <div id="missionList"></div>
        <div id="missionText"></div>
      </div>
    </div>

    <div class="window" id="launch" style="display: none; top: 220px; left: 260px;">
      <div class="windowheader" id="launchheader">
        <strong>Launch Control</strong>
        <span class="closebutton" id="launchclose">X</span>
      </div>

      <h2>Artemis V Panel</h2>

      <p>Status: <strong id="launchStatus">Not ready</strong></p>

      <p>Fuel:</p>
      <div class="fuelOuter">
        <div id="fuelBar"></div>
      </div>

      <p id="fuelText">0%</p>

      <button id="fuelButton">Add Fuel</button>
      <button id="armButton">Arm Rocket</button>
      <button id="launchButton">Launch</button>
      <button id="abortButton">Abort Launch</button>
      <button id="buildButton">Rebuild Rocket</button>

      <h3>System Log</h3>
      <div id="launchLog"></div>
    </div>
    

    <script src="script.js"></script>
  </body>
</html>
